services:
  izhs-dashboard:
    container_name: izhs-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    image: izhs-dashboard:latest
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
